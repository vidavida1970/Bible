  <title>오늘의 말씀 | 잠언 8:33-35</title>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; background: #253328; color: #fff; }
    body { min-height: 100vh; }

    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 56px 20px 72px;
      background-image:
        linear-gradient(180deg, rgba(14, 28, 20, .28), rgba(13, 31, 22, .64)),
        url("https://images.pexels.com/photos/1009355/pexels-photo-1009355.jpeg?auto=compress&cs=tinysrgb&w=2000");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 58% 20%, rgba(255, 225, 151, .24), transparent 28%),
        linear-gradient(180deg, transparent 40%, rgba(10, 25, 18, .24) 100%);
      pointer-events: none;
    }

    .container { position: relative; z-index: 1; width: min(980px, 100%); display: grid; gap: 28px; }

    .verse-card {
      padding: clamp(34px, 6vw, 70px);
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(22, 46, 33, .72), rgba(33, 44, 31, .46));
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: 0 30px 90px rgba(0,0,0,.30);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
    }

    .label { margin: 0 0 24px; font-size: 13px; font-weight: 800; letter-spacing: .22em; color: #f7dda0; }

    blockquote {
      margin: 0;
      font-family: "Noto Serif KR", "Nanum Myeongjo", serif;
      font-size: clamp(23px, 4vw, 42px);
      line-height: 1.68;
      font-weight: 700;
      letter-spacing: -.04em;
      word-break: keep-all;
      text-shadow: 0 4px 22px rgba(0,0,0,.62);
    }

    .reference { margin-top: 28px; font-size: clamp(16px, 2vw, 20px); font-weight: 800; color: rgba(255,255,255,.94); }

    .video-card {
      padding: 22px;
      border-radius: 28px;
      background: rgba(20, 40, 29, .82);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 24px 70px rgba(0,0,0,.27);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .video-title { display: flex; align-items: center; gap: 10px; margin: 0 0 16px; font-size: 16px; font-weight: 800; }
    .play { width: 31px; height: 31px; display: inline-grid; place-items: center; border-radius: 50%; background: #fff; color: #294331; font-size: 12px; }
    .video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 20px; background: #000; }
    .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .fallback { margin: 14px 0 0; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,.76); }
    .watch-button { display: inline-flex; align-items: center; justify-content: center; margin-top: 12px; min-height: 46px; padding: 0 19px; border-radius: 999px; background: #fff; color: #294331; text-decoration: none; font-size: 14px; font-weight: 800; }
    .credit { margin: 2px auto 0; color: rgba(255,255,255,.72); font-size: 12px; text-align: center; line-height: 1.6; }
    .credit a { color: rgba(255,255,255,.90); }

    @media (max-width: 700px) {
      .hero { padding: 28px 14px 42px; background-attachment: scroll; }
      .container { gap: 18px; }
      .verse-card { padding: 34px 22px; border-radius: 25px; }
      blockquote { line-height: 1.60; }
      .video-card { padding: 14px; border-radius: 22px; }
      .video-wrap { border-radius: 15px; }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="container">
      <section class="verse-card" aria-label="오늘의 말씀">
        <p class="label">TODAY'S WORD · 오늘의 말씀</p>
        <blockquote>
          “내 훈계를 들어서 지혜를 얻고,<br>
          그것을 무시하지 말아라.<br>
          날마다 나의 문을 지켜 보며,<br>
          내 문설주 곁에 지키고 서서,<br>
          내 말을 듣는 사람은 복이 있다.<br>
          나를 얻는 사람은 생명을 얻고,<br>
          주님께로부터 은총을 받을 것이다.”
        </blockquote>
        <div class="reference">잠언 8:33-35</div>
      </section>

      <section class="video-card" aria-label="말씀 묵상 영상">
        <h2 class="video-title"><span class="play">▶</span>말씀과 함께 영상 보기</h2>
        <div class="video-wrap">
          <iframe
            src="https://www.youtube-nocookie.com/embed/a6roEg1VLfw?rel=0&playsinline=1"
            title="잠언 8장 33절부터 35절 말씀 묵상 영상"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        </div>
        <p class="fallback">브라우저 환경에 따라 영상 재생이 제한될 경우 아래 버튼으로 바로 시청할 수 있습니다.</p>
        <a class="watch-button" href="https://youtu.be/a6roEg1VLfw?si=KTjkx9WAkahXWtoH" target="_blank" rel="noopener noreferrer">▶ YouTube에서 바로 보기</a>
      </section>

      <p class="credit">Background photo: <a href="https://www.pexels.com/photo/empty-wooden-pathway-in-forest-1009355/" target="_blank" rel="noopener noreferrer">Pille Kirsi / Pexels</a></p>
    </div>
  </main>
</body>
</html>
