<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#183b36" />
  <meta name="description" content="마태복음서 6장 25절 말씀 묵상" />
  <title>오늘의 말씀 | 마태복음서 6:25</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; background: #193d36; color: #fff; }
    body { min-height: 100vh; }
    .hero { min-height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; padding: 56px 20px 72px; background-image: linear-gradient(180deg, rgba(8, 28, 28, .28), rgba(8, 28, 28, .56)), url("https://images.pexels.com/photos/9151829/pexels-photo-9151829.jpeg?auto=compress&cs=tinysrgb&w=2000"); background-size: cover; background-position: center; background-attachment: fixed; }
    .hero::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 50% 20%, rgba(255, 226, 159, .20), transparent 28%), linear-gradient(180deg, transparent 48%, rgba(11, 34, 31, .30) 100%); pointer-events: none; }
    .container { position: relative; z-index: 1; width: min(980px, 100%); display: grid; gap: 28px; }
    .verse-card { padding: clamp(34px, 6vw, 72px); border-radius: 34px; background: linear-gradient(145deg, rgba(18, 52, 49, .68), rgba(23, 47, 43, .44)); border: 1px solid rgba(255,255,255,.24); box-shadow: 0 30px 90px rgba(0,0,0,.28); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); text-align: center; }
    .label { margin: 0 0 24px; font-size: 13px; font-weight: 800; letter-spacing: .22em; color: #f4dda1; }
    blockquote { margin: 0; font-family: "Noto Serif KR", "Nanum Myeongjo", serif; font-size: clamp(24px, 4.2vw, 44px); line-height: 1.62; font-weight: 700; letter-spacing: -.04em; word-break: keep-all; text-shadow: 0 4px 20px rgba(0,0,0,.56); }
    .reference { margin-top: 28px; font-size: clamp(16px, 2vw, 20px); font-weight: 800; color: rgba(255,255,255,.92); }
    .video-card { padding: 22px; border-radius: 28px; background: rgba(14, 41, 39, .78); border: 1px solid rgba(255,255,255,.20); box-shadow: 0 24px 70px rgba(0,0,0,.26); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .video-title { display: flex; align-items: center; gap: 10px; margin: 0 0 16px; font-size: 16px; font-weight: 800; }
    .play { width: 31px; height: 31px; display: inline-grid; place-items: center; border-radius: 50%; background: #fff; color: #173c37; font-size: 12px; }
    .video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 20px; background: #000; }
    .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .fallback { margin: 14px 0 0; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,.74); }
    .watch-button { display: inline-flex; align-items: center; justify-content: center; margin-top: 12px; min-height: 46px; padding: 0 19px; border-radius: 999px; background: #fff; color: #173c37; text-decoration: none; font-size: 14px; font-weight: 800; }
    .credit { margin: 2px auto 0; color: rgba(255,255,255,.70); font-size: 12px; text-align: center; line-height: 1.6; }
    .credit a { color: rgba(255,255,255,.88); }
    @media (max-width: 700px) { .hero { padding: 28px 14px 42px; background-attachment: scroll; } .container { gap: 18px; } .verse-card { padding: 34px 22px; border-radius: 25px; } blockquote { line-height: 1.58; } .video-card { padding: 14px; border-radius: 22px; } .video-wrap { border-radius: 15px; } }
  </style>
</head>
<body>
  <main class="hero">
    <div class="container">
      <section class="verse-card" aria-label="오늘의 말씀">
        <p class="label">TODAY'S WORD · 오늘의 말씀</p>
        <blockquote>“그러므로 내가 너희에게 말한다.<br>목숨을 부지하려고 무엇을 먹을까 또는 무엇을 마실까 걱정하지 말고,<br>몸을 감싸려고 무엇을 입을까 걱정하지 말아라.<br>목숨이 음식보다 소중하지 아니하냐?<br>몸이 옷보다 소중하지 아니하냐?”</blockquote>
        <div class="reference">마태복음서 6:25</div>
      </section>
      <section class="video-card" aria-label="말씀 묵상 영상">
        <h2 class="video-title"><span class="play">▶</span>말씀과 함께 영상 보기</h2>
        <div class="video-wrap">
          <iframe src="https://www.youtube-nocookie.com/embed/KItIDIrUHwA?rel=0&playsinline=1" title="마태복음서 6장 25절 묵상 영상" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
        <p class="fallback">브라우저 환경에 따라 영상 재생이 제한될 경우 아래 버튼으로 바로 시청할 수 있습니다.</p>
        <a class="watch-button" href="https://youtu.be/KItIDIrUHwA?si=IKeXMjF2Xuyw595n" target="_blank" rel="noopener noreferrer">▶ YouTube에서 바로 보기</a>
      </section>
      <p class="credit">Background photo: <a href="https://www.pexels.com/photo/sunrise-over-meadow-9151829/" target="_blank" rel="noopener noreferrer">Darshak Chauhan / Pexels</a></p>
    </div>
  </main>
</body>
</html>
